routes:
  - id: relay-openai
    uri: /openai/*
    upstream:
      type: roundrobin
      scheme: https
      nodes:
        "api.openai.com:443": 1
    plugins:
      key-auth: {}
      ai-rate-limiting:
        model: "$request_body.model"
        limit: 1000
        time_window: 60
        rejected_code: 429
      prometheus:
        prefer_name: true
      http-logger:
        uri: "http://vector:8080/ingest"
        method: POST
        content_type: "application/json"
        batch_max_size: 1
        include_req_body: false
        include_resp_body: false
        log_format:
          provider: "openai"
          model: "$request_body.model"
          stream: "$request_body.stream"
          method: "$request_method"
          uri: "$uri"
          status: "$status"
          latency: "$upstream_latency_ms"
      proxy-buffering:
        disable: true
      proxy-rewrite:
        regex_uri: ["^/openai/(.*)", "/$1"]
      redact:
        patterns_file: "/etc/apisix/redact-patterns.json"

