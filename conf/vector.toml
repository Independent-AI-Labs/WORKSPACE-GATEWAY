[sources.apisix_http_logger]
type = "http_server"
address = "0.0.0.0:8080"
path = "/ingest"
encoding = "json"

[transforms.parse_log]
type = "remap"
inputs = ["apisix_http_logger"]
source = """
.provider = "opencode"

req_body_str = to_string!(.request.body || "")
req_parsed = parse_json(req_body_str) ?? {}
model_raw = to_string!(req_parsed.model || "")
# BEGIN GENERATED MODEL CANONICALIZATION (source: conf/model-registry.yaml - regenerate via res/scripts/gen-model-registry.sh, never edit by hand)
# Model canonicalization - GENERATED from conf/model-registry.yaml.
# Algorithm mirrors plugins/custom/model_registry.lua M.canonical:
# exact lowercase hit, else last-slash-segment hit, else last segment.
model_lower = downcase(model_raw)
model_alias_map = { "/zip/minicpm5-1b-q8_0.gguf": "minicpm5-1b-q8_0.gguf", "accounts/fireworks/models/glm-5p0": "glm-5", "accounts/fireworks/models/glm-5p1": "glm-5.1", "accounts/fireworks/models/glm-5p2": "glm-5.2", "frank/glm-5.2": "glm-5.2", "glm-5": "glm-5", "glm-5.1": "glm-5.1", "glm-5.2": "glm-5.2", "glm-5p0": "glm-5", "glm-5p1": "glm-5.1", "glm-5p2": "glm-5.2", "k3": "kimi-k2.7-code", "kimi-for-coding": "kimi-k2.7-code", "kimi-k2.7-code": "kimi-k2.7-code", "minicpm5-1b-q8_0.gguf": "minicpm5-1b-q8_0.gguf", "moonshotai/kimi-k2.7-code": "kimi-k2.7-code", "z-ai/glm-5": "glm-5", "z-ai/glm-5.1": "glm-5.1", "z-ai/glm-5.2": "glm-5.2" }
model_canon = get(model_alias_map, [model_lower]) ?? null
if model_canon == null {
  model_seg_caps = parse_regex(model_lower, r'(?P<model>[^/]+)$') ?? null
  model_seg = if model_seg_caps != null { to_string(model_seg_caps.model) } else { model_lower }
  model_canon = get(model_alias_map, [model_seg]) ?? model_seg
}
# END GENERATED MODEL CANONICALIZATION
.model = model_canon
.stream = to_string!(req_parsed.stream || false) == "true"

.method = to_string!(.request.method || "")
.uri = to_string!(.request.uri || "")
.request_size = to_int(.request.size || 0) ?? 0

resp_body_str = to_string!(.response.body || "")
resp_parsed = parse_json(resp_body_str) ?? {}

usage_obj = resp_parsed.usage || null

if (usage_obj == null && contains(resp_body_str, "data:")) {
  usage_caps = parse_regex(resp_body_str, r'"usage"\\s*:\\s*(?P<usage>\\{[^}]*\\})') ?? null
  if (usage_caps != null) {
    usage_json_str = to_string(usage_caps.usage || "")
    if (usage_json_str != "") {
      usage_obj = parse_json(usage_json_str) ?? null
    }
  }
}

if (usage_obj == null) {
  usage_obj = {}
}

.prompt_tokens = to_int(usage_obj.prompt_tokens || 0) ?? 0
.completion_tokens = to_int(usage_obj.completion_tokens || 0) ?? 0
.total_tokens = to_int(usage_obj.total_tokens || 0) ?? 0

.status = to_int(.response.status || 0) ?? 0
.response_size = to_int(.response.size || 0) ?? 0
upstream_latency_ms = to_float(.upstream_latency || 0) ?? 0.0
.upstream_response_time_s = upstream_latency_ms / 1000.0
.client_ip = to_string!(.client_ip || "0.0.0.0")

consumer_obj = .consumer || {}
.api_key_id = to_string!(consumer_obj.username || "")

req_headers = .request.headers || {}
resolved_key_id = to_string!(get!(req_headers, ["x-gateway-key-id"]) || "")

auth_hdr = to_string!(get!(req_headers, ["authorization"]) || "")
client_token = ""
if auth_hdr != "" {
  captured = parse_regex(auth_hdr, r'^\\s*[Bb]earer\\s+(?P<tok>.+)$') ?? null
  if captured != null { client_token = to_string(captured.tok) }
}

final_key = if (resolved_key_id == "" || resolved_key_id == "passthrough") && client_token != "" { client_token } else { resolved_key_id }

hashed = if final_key != "" {
  full = sha2(final_key, variant: "SHA-256")
  slice(full, 0, 16) ?? ""
} else {
  ""
}
.key_id = hashed

.tenant_id = to_string!(get!(req_headers, ["x-gateway-tenant-id"]) || "")
.user_id = to_string!(get!(req_headers, ["x-gateway-user-id"]) || "")
.session_id = to_string!(get!(req_headers, ["x-session-id"]) || "")
.parent_session_id = to_string!(get!(req_headers, ["x-parent-session-id"]) || "")
.user_agent = to_string!(get!(req_headers, ["user-agent"]) || "")

route_id_str = to_string!(.route_id || "")
# APISIX http-logger sends `start_time` as integer MILLISECONDS since epoch.
start_time_ms = to_int(.start_time || 0) ?? 0
# Integer SECONDS (floor) used for event_id - matches sse-usage.lua which
# does math.floor(ngx.var.start_time) on the Lua side (start_time there is
# epoch-seconds with millisecond precision). Both sides converge on the
# same integer-second value, e.g. 1783607080.
start_time_int = to_int(start_time_ms / 1000)
.event_id = route_id_str + "_" + to_string(start_time_int)

.req_body = req_body_str
.resp_body = resp_body_str

.request_id = to_string!(get!(req_headers, ["x-request-id"]) || "")

.timestamp = format_timestamp!(from_unix_timestamp(start_time_ms, "milliseconds") ?? now(), "%Y-%m-%d %H:%M:%S%.3f")
"""

[sinks.clickhouse_request_log]
type = "clickhouse"
inputs = ["parse_log"]
endpoint = "http://clickhouse:8123"
database = "llm_gateway"
table = "request_log"
skip_unknown_fields = true

[sinks.clickhouse_request_log.batch]
max_events = 50
timeout_secs = 1

[sinks.clickhouse_request_log.buffer]
type = "memory"
max_events = 10000
when_full = "block"

[sinks.clickhouse_request_log.request]
retry_attempts = 5
retry_initial_backoff_secs = 1
retry_max_duration_secs = 30
timeout_secs = 30
