deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml

apisix:
  admin_key: ""

plugins:
  - key-resolver
  - ai-rate-limiting
  - proxy-buffering
  - http-logger
  - prometheus
  - redact
  - sse-usage

plugin_attr:
  prometheus:
    export_addr:
      ip: "0.0.0.0"
      port: 9100

nginx_config:
  envs:
    - OPENCODE_ZEN_API_KEY
    - OPENBAO_TOKEN
  http:
    custom_lua_shared_dict:
      redact_state: 1m
      key_cache: 5m
    proxy_buffering: "on"
