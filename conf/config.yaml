deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml

apisix:
  admin_key: ""

plugins:
  - key-auth
  - ai-rate-limiting
  - proxy-buffering
  - http-logger
  - prometheus
  - redact

plugin_attr:
  prometheus:
    export_addr:
      ip: "0.0.0.0"
      port: 9100

nginx_config:
  http:
    custom_lua_shared_dict:
      redact_state: 1m
    proxy_buffering: "on"
