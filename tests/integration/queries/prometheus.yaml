# Prometheus expressions extracted from gateway-overview dashboard
# Placeholder: __API_KEY_REGEX__ → regex string for key_hash filter
# Each entry uses block scalar (|) to preserve quotes literally

- panel: 1
  refId: "A"
  title: "Total Requests"
  expr: |-
    sum(apisix_http_status{key_hash=~"__API_KEY_REGEX__"})

- panel: 4
  refId: "A"
  title: "Error Rate %"
  expr: |-
    (sum(rate(apisix_http_status{key_hash=~"__API_KEY_REGEX__",code=~"5.."}[5m])) or vector(0)) / sum(rate(apisix_http_status{key_hash=~"__API_KEY_REGEX__"}[5m])) * 100

- panel: 2
  refId: "A"
  title: "Active Connections"
  expr: |-
    apisix_nginx_http_current_connections{state="active"}

- panel: 5
  refId: "A"
  title: "Request Rate (req/s)"
  expr: |-
    sum(rate(apisix_http_status{key_hash=~"__API_KEY_REGEX__"}[5m]))

- panel: 7
  refId: "A"
  title: "Status Code Breakdown"
  expr: |-
    sum by (code) (apisix_http_status{key_hash=~"__API_KEY_REGEX__"})

- panel: 9
  refId: "A"
  title: "Latency p50 / p95 / p99 (ms)"
  expr: |-
    histogram_quantile(0.50, sum by (le) (rate(apisix_http_latency_bucket{key_hash=~"__API_KEY_REGEX__",type="apisix"}[5m]))) * 1000

- panel: 9
  refId: "B"
  title: "Latency p50 / p95 / p99 (ms)"
  expr: |-
    histogram_quantile(0.95, sum by (le) (rate(apisix_http_latency_bucket{key_hash=~"__API_KEY_REGEX__",type="apisix"}[5m]))) * 1000

- panel: 9
  refId: "C"
  title: "Latency p50 / p95 / p99 (ms)"
  expr: |-
    histogram_quantile(0.99, sum by (le) (rate(apisix_http_latency_bucket{key_hash=~"__API_KEY_REGEX__",type="apisix"}[5m]))) * 1000

- panel: 11
  refId: "A"
  title: "Bandwidth In / Out (bytes/s)"
  expr: |-
    rate(apisix_bandwidth{key_hash=~"__API_KEY_REGEX__",type="ingress"}[5m])

- panel: 11
  refId: "B"
  title: "Bandwidth In / Out (bytes/s)"
  expr: |-
    rate(apisix_bandwidth{key_hash=~"__API_KEY_REGEX__",type="egress"}[5m])

- panel: 12
  refId: "A"
  title: "Shared Dict Memory Usage"
  expr: |-
    (1 - apisix_shared_dict_free_space_bytes{name="key_cache"} / apisix_shared_dict_capacity_bytes{name="key_cache"}) * 100

- panel: 12
  refId: "B"
  title: "Shared Dict Memory Usage"
  expr: |-
    (1 - apisix_shared_dict_free_space_bytes{name="redact_state"} / apisix_shared_dict_capacity_bytes{name="redact_state"}) * 100

