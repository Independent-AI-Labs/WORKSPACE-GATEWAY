---
# WORKSPACE-GATEWAY Ansible playbook - Podman stack lifecycle.
#
# Pattern: single playbook, tagged blocks. Makefile delegates via:
#   ansible-playbook res/ansible/dev.yml --tags <tag>
#
# INCIDENT-2026-07-07: compose build/up/down previously ran inside
#   ansible.builtin.command tasks, which captured all stdout and made
#   builds + health-probe loops look like an indefinite freeze. These
#   operations now run directly from Makefile targets (_compose-build,
#   _compose-up, _compose-down) so output streams live to the terminal.
#   This playbook handles only: health checks, ClickHouse init, model
#   sync, status, sanity.
#
# Tags:
#   start    - health checks + ClickHouse init + model sync
#   status   - podman ps + endpoint health
#   logs     - tail container logs
#   sanity   - single curl request through gateway
#
# Makefile orchestrates multi-step flows:
#   dev-start = _compose-build + _compose-up + ansible --tags start
#   dev-stop = _compose-down (no ansible needed)
#   dev-restart = dev-stop + dev-start
#   dev-test = bash tests/run_all.sh (no ansible needed)

- name: WORKSPACE-GATEWAY dev lifecycle
  hosts: localhost
  gather_facts: true
  connection: local

  vars:
    project_root: "{{ playbook_dir | dirname | dirname }}"
    compose_file: "{{ project_root }}/res/docker/docker-compose.yml"
    venv_bin: "{{ project_root }}/.venv/bin"
    compose_cmd: "{{ venv_bin }}/podman-compose -f {{ compose_file }}"
    admin_api_key: "{{ lookup('env', 'ADMIN_KEY') }}"

  environment:
    PATH: "{{ venv_bin }}:{{ lookup('env', 'PATH') }}"

  tasks:

    # ── always: resolve paths, verify prerequisites ──────────────────────
    - name: Resolve project root
      ansible.builtin.set_fact:
        project_root: "{{ project_root }}"
        compose_file: "{{ compose_file }}"
        compose_cmd: "{{ compose_cmd }}"
      tags: always

    - name: Verify podman is available
      ansible.builtin.shell: command -v podman
      register: podman_check
      changed_when: false
      tags: always

    - name: Show podman path
      ansible.builtin.debug:
        msg: "podman: {{ podman_check.stdout }}"
      tags: always

    - name: Verify podman-compose is available
      ansible.builtin.stat:
        path: "{{ venv_bin }}/podman-compose"
      register: compose_bin
      failed_when: not compose_bin.stat.exists
      tags: always

    - name: Require ADMIN_KEY environment variable
      ansible.builtin.assert:
        that:
          - lookup('env', 'ADMIN_KEY') | length > 0
        fail_msg: "ADMIN_KEY must be set (add to .env, see .env.example)"
      tags: always


    # ── start: render apisix.yaml, then health checks + init + sync ──────
    # NOTE: compose build/up/down are now Makefile targets (see header).
    # This tag assumes the stack is already up via `make _compose-up`.
    # APISIX standalone YAML mode polls apisix.yaml every 1s, so rendering
    # the .j2 here (after compose-up) hot-reloads the llamafile route into
    # the running APISIX without a container restart.
    - name: Capture llamafile upstream env vars (empty -> .j2 defaults apply)
      ansible.builtin.set_fact:
        LLAMAFILE_UPSTREAM_HOST: "{{ lookup('env', 'LLAMAFILE_UPSTREAM_HOST') }}"
        LLAMAFILE_UPSTREAM_PORT: "{{ lookup('env', 'LLAMAFILE_UPSTREAM_PORT') }}"
      tags: [start]

    - name: Render conf/apisix.yaml from .j2 template (env-driven llamafile route)
      ansible.builtin.template:
        src: "{{ project_root }}/conf/apisix.yaml.j2"
        dest: "{{ project_root }}/conf/apisix.yaml"
        mode: '0644'
        backup: false
      tags: [start]

    - name: Create external network dataops_default
      ansible.builtin.command: podman network create dataops_default
      register: net_create
      changed_when: net_create.rc == 0
      failed_when: net_create.rc != 0 and 'exists' not in (net_create.stderr | default(''))
      tags: [start]

    - name: Show network create result
      ansible.builtin.debug:
        msg: "{{ net_create.stdout_lines | default([]) + (net_create.stderr_lines | default([])) }}"
      tags: [start]

    - name: Wait for OpenBao to be ready (unsealed)
      ansible.builtin.uri:
        url: http://localhost:8201/v1/sys/health
        method: GET
        status_code: [200]
        timeout: 5
      register: bao_health
      until: bao_health.status == 200
      retries: 30
      delay: 2
      tags: [start]

    - name: Wait for APISIX to be ready
      ansible.builtin.uri:
        url: http://localhost:9080/
        method: GET
        status_code: [200, 404]
        timeout: 5
      register: apisix_health
      until: apisix_health.status in [200, 404]
      retries: 15
      delay: 2
      tags: [start]

    - name: Wait for etcd to be ready
      ansible.builtin.uri:
        url: http://localhost:2379/health
        method: GET
        status_code: [200]
        timeout: 5
      register: etcd_health
      until: etcd_health.status == 200
      retries: 15
      delay: 2
      tags: [start]

    - name: Wait for APISIX Admin API to be ready
      ansible.builtin.uri:
        url: http://localhost:9180/apisix/admin/routes
        method: GET
        headers:
          X-API-KEY: "{{ admin_api_key }}"
        status_code: [200]
        timeout: 5
      register: admin_health
      until: admin_health.status == 200
      retries: 15
      delay: 2
      tags: [start]

    - name: Seed routes from conf/apisix.yaml into Admin API (etcd)
      ansible.builtin.command: "{{ project_root }}/res/scripts/seed-routes.sh"
      args:
        chdir: "{{ project_root }}"
      register: seed_result
      changed_when: "'seeded' in (seed_result.stdout | default(''))"
      tags: [start]

    - name: Show seed result
      ansible.builtin.debug:
        var: seed_result.stdout_lines
      tags: [start]

    - name: Wait for ClickHouse to be ready
      ansible.builtin.uri:
        url: http://localhost:8123/ping
        method: GET
        status_code: [200]
        timeout: 5
      register: ch_health
      until: ch_health.status == 200
      retries: 15
      delay: 2
      tags: [start]

    - name: Run ClickHouse init SQL (idempotent)
      ansible.builtin.shell: >
        podman exec -i docker_clickhouse_1 clickhouse-client --multiquery
        < {{ project_root }}/conf/clickhouse-init.sql
      register: ch_init
      changed_when: true
      tags: [start]

    - name: Show ClickHouse init output
      ansible.builtin.debug:
        var: ch_init.stdout_lines
      tags: [start]

    - name: Run ClickHouse schema migrations (golang-migrate via compose)
      ansible.builtin.command: "{{ compose_cmd }} run --rm migrate up"
      args:
        chdir: "{{ project_root }}"
      register: ch_migrate
      changed_when: "'no change' not in (ch_migrate.stdout | default(''))"
      tags: [start]

    - name: Show schema migration output
      ansible.builtin.debug:
        var: ch_migrate.stdout_lines
      tags: [start]

    - name: Wait for Prometheus metrics endpoint
      ansible.builtin.uri:
        url: http://localhost:9100/apisix/prometheus/metrics
        method: GET
        status_code: [200]
        timeout: 5
      register: prom_health
      until: prom_health.status == 200
      retries: 15
      delay: 2
      tags: [start]

    - name: Wait for gateway Prometheus to be ready
      ansible.builtin.uri:
        url: http://localhost:9092/-/healthy
        method: GET
        status_code: [200]
        timeout: 5
      register: gw_prom_health
      until: gw_prom_health.status == 200
      retries: 15
      delay: 2
      tags: [start]

    - name: Wait for Grafana to be ready
      ansible.builtin.uri:
        url: http://localhost:3030/api/health
        method: GET
        status_code: [200]
        timeout: 5
      register: grafana_health
      until: grafana_health.status == 200
      retries: 30
      delay: 3
      tags: [start]

    - name: Display stack endpoints
      ansible.builtin.debug:
        msg: |
          Stack is ready.
            APISIX:             http://localhost:9080
            APISIX Admin API:   http://localhost:9180
            APISIX Dashboard:   http://localhost:9180/ui/
            Grafana:            http://localhost:3030
            Prometheus:         http://localhost:9092
            APISIX metrics:     http://localhost:9100/apisix/prometheus/metrics
            ClickHouse:         http://localhost:8123
            Vector:             http://localhost:8080/ingest
            OpenBao:            http://localhost:8201
            etcd:               http://localhost:2379
      tags: [start]

    - name: Sync models from gateway into opencode config
      ansible.builtin.shell: |
        if [ -f {{ project_root }}/.env ]; then
          set -a; . {{ project_root }}/.env; set +a
        fi
        bash {{ project_root }}/res/scripts/sync-opencode-models.sh
      args:
        chdir: "{{ project_root }}"
      register: sync_result
      changed_when: true
      tags: [start]

    - name: Show sync result
      ansible.builtin.debug:
        var: sync_result.stdout_lines
      tags: [start]


    # ── status: show running containers + health ─────────────────────────
    - name: Show running containers
      ansible.builtin.command: podman ps --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}\t{{ '{{' }}.Ports{{ '}}' }}"
      register: ps_output
      changed_when: false
      tags: [status, never]

    - name: Display running containers
      ansible.builtin.debug:
        var: ps_output.stdout_lines
      tags: [status, never]

    - name: Check APISIX health
      ansible.builtin.uri:
        url: http://localhost:9080/
        method: GET
        status_code: [200, 404]
        timeout: 5
      register: apisix_status
      failed_when: apisix_status.status | default(0) < 0
      tags: [status, never]

    - name: Check ClickHouse health
      ansible.builtin.uri:
        url: http://localhost:8123/ping
        method: GET
        status_code: [200]
        timeout: 5
      register: ch_status
      failed_when: ch_status.status | default(0) < 0
      tags: [status, never]

    - name: Check etcd health
      ansible.builtin.uri:
        url: http://localhost:2379/health
        method: GET
        status_code: [200]
        timeout: 5
      register: etcd_status
      failed_when: etcd_status.status | default(0) < 0
      tags: [status, never]

    - name: Check APISIX Admin API
      ansible.builtin.uri:
        url: http://localhost:9180/apisix/admin/routes
        method: GET
        headers:
          X-API-KEY: "{{ admin_api_key }}"
        status_code: [200]
        timeout: 5
      register: admin_status
      failed_when: admin_status.status | default(0) < 0
      tags: [status, never]

    - name: Check Prometheus metrics
      ansible.builtin.uri:
        url: http://localhost:9100/apisix/prometheus/metrics
        method: GET
        status_code: [200]
        timeout: 5
      register: prom_status
      failed_when: prom_status.status | default(0) < 0
      tags: [status, never]

    - name: Check Grafana health
      ansible.builtin.uri:
        url: http://localhost:3030/api/health
        method: GET
        status_code: [200]
        timeout: 5
      register: grafana_status
      failed_when: grafana_status.status | default(0) < 0
      tags: [status, never]

    - name: Check gateway Prometheus health
      ansible.builtin.uri:
        url: http://localhost:9092/-/healthy
        method: GET
        status_code: [200]
        timeout: 5
      register: gw_prom_status
      failed_when: gw_prom_status.status | default(0) < 0
      tags: [status, never]

    - name: Display health status
      ansible.builtin.debug:
        msg:
          - "APISIX:           {{ 'UP' if apisix_status.status in [200, 404] else 'DOWN' }}"
          - "APISIX Admin:     {{ 'UP' if admin_status.status == 200 else 'DOWN' }}"
          - "etcd:             {{ 'UP' if etcd_status.status == 200 else 'DOWN' }}"
          - "ClickHouse:       {{ 'UP' if ch_status.status == 200 else 'DOWN' }}"
          - "APISIX metrics:   {{ 'UP' if prom_status.status == 200 else 'DOWN' }}"
          - "Grafana:          {{ 'UP' if grafana_status.status == 200 else 'DOWN' }}"
          - "Prometheus:       {{ 'UP' if gw_prom_status.status == 200 else 'DOWN' }}"
      tags: [status, never]


    # ── sanity: single request through gateway ───────────────────────────
    - name: Send sanity check request
      ansible.builtin.shell: |
        if [ -f {{ project_root }}/.env ]; then
          set -a; . {{ project_root }}/.env; set +a
        fi
        curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
          -X POST http://localhost:9080/opencode/v1/chat/completions \
          -H "Authorization: Bearer $OPENCODE_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"model":"minimax-m3","messages":[{"role":"user","content":"Say hello"}],"stream":false}'
      args:
        chdir: "{{ project_root }}"
      register: sanity_code
      changed_when: false
      failed_when: sanity_code.rc != 0
      tags: [sanity, never]

    - name: Show sanity result
      ansible.builtin.debug:
        msg: "Sanity check HTTP status: {{ sanity_code.stdout }}"
      tags: [sanity, never]
