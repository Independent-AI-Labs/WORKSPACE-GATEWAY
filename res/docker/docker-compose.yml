services:
  apisix:
    build:
      context: ../..
      dockerfile: res/docker/Dockerfile.apisix
    ports:
      - "9080:9080"
      - "9443:9443"
      - "9100:9100"
    volumes:
      - ../../conf/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - ../../conf/redact-patterns.json:/etc/apisix/redact-patterns.json:ro
    env_file:
      - ../../.env
    depends_on:
      - vector
      - openbao
    restart: unless-stopped
    networks:
      - gateway
      - dataops

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ../../conf/clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    restart: unless-stopped
    networks:
      - gateway

  vector:
    image: timberio/vector:0.40.0-debian
    command: ["--config", "/etc/vector/vector.toml"]
    volumes:
      - ../../conf/vector.toml:/etc/vector/vector.toml:ro
    ports:
      - "8080:8080"
    depends_on:
      - clickhouse
    restart: unless-stopped
    networks:
      - gateway

  openbao:
    image: docker.io/openbao/openbao:2.4.4
    container_name: gw-openbao
    command:
      - server
      - -dev
      - -dev-root-token-id=${OPENBAO_TOKEN:-2e22c6e00b0815bcada90dfecb03f3c0}
      - -dev-listen-address=0.0.0.0:8200
    environment:
      BAO_LOG_LEVEL: info
    ports:
      - "8201:8200"
    restart: unless-stopped
    networks:
      - gateway

volumes:
  clickhouse-data:

networks:
  gateway:
    driver: bridge
  dataops:
    external: true
    name: dataops_default
