services:
  apisix:
    build:
      context: ../..
      dockerfile: res/docker/Dockerfile.apisix
    ports:
      - "9080:9080"
      - "9443:9443"
      - "9100:9100"
    volumes:
      - ../../conf/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - ../../conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ../../conf/redact-patterns.json:/etc/apisix/redact-patterns.json:ro
      - ../../plugins/custom/key-resolver.lua:/usr/local/apisix/apisix/plugins/key-resolver.lua:ro
      - ../../plugins/custom/key-meta.lua:/usr/local/apisix/apisix/plugins/key-meta.lua:ro
      - ../../plugins/custom/sse-usage.lua:/usr/local/apisix/apisix/plugins/sse-usage.lua:ro
      - ../../plugins/custom/sse_usage_lib.lua:/usr/local/apisix/apisix/plugins/sse_usage_lib.lua:ro
      - ../../plugins/custom/cost_calc.lua:/usr/local/apisix/apisix/plugins/cost_calc.lua:ro
      - ../../plugins/custom/redact.lua:/usr/local/apisix/apisix/plugins/redact.lua:ro
      - ../../plugins/custom/redact_lib.lua:/usr/local/apisix/apisix/plugins/redact_lib.lua:ro
    env_file:
      - ../../.env
    depends_on:
      - vector
      - openbao
    restart: unless-stopped
    networks:
      - gateway
      - dataops

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ../../conf/clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    restart: unless-stopped
    networks:
      - gateway

  # One-shot schema migration runner (golang-migrate, ClickHouse-KB-recommended).
  # Pinned image; restart:no so it exits after applying migrations.
  # Invoked by res/ansible/dev.yml AFTER init.sql (healthcheck-gated) and by
  # `make ch-migrate` / `make ch-migrate-status`. Uses the ClickHouse NATIVE
  # protocol (port 9000, not HTTP 8123) - golang-migrate's `clickhouse://`
  # scheme maps to the native protocol. Connects via compose DNS
  # (clickhouse:9000), NOT localhost - no --network host needed.
  # x-migrations-table-engine=MergeTree so schema_migrations survives
  # clickhouse-backup (default TinyLog is not backed up).
  migrate:
    image: migrate/migrate:v4.19.1
    container_name: gw-migrate
    depends_on:
      - clickhouse
    volumes:
      - ../../conf/migrations:/migrations:ro
    # entrypoint holds the persistent flags so `podman-compose run --rm
    # migrate <subcommand>` replaces ONLY args (subcommand), preserving
    # -path and -database. Default command is "up"; overridden by
    # `run ... migrate version` for status, etc.
    entrypoint:
      - "migrate"
      - "-path=/migrations/"
      - "-database=clickhouse://clickhouse:9000/llm_gateway?database=llm_gateway&x-multi-statement=true&x-migrations-table-engine=MergeTree"
    command: ["up"]
    restart: "no"
    networks:
      - gateway

  vector:
    image: timberio/vector:0.40.0-debian
    command: ["--config", "/etc/vector/vector.toml"]
    volumes:
      - ../../conf/vector.toml:/etc/vector/vector.toml:ro
    ports:
      - "8080:8080"
    depends_on:
      - clickhouse
    restart: unless-stopped
    networks:
      - gateway

  openbao:
    build:
      context: ../..
      dockerfile: res/docker/Dockerfile.openbao
    container_name: gw-openbao
    volumes:
      - ../../conf/openbao.hcl:/openbao/config/openbao.hcl:ro
      - openbao-data:/openbao/data
    env_file:
      - ../../.env
    environment:
      BAO_LOG_LEVEL: info
    ports:
      - "8201:8200"
    restart: unless-stopped
    networks:
      - gateway

  prometheus:
    image: prom/prometheus:v3.13.0
    container_name: gw-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ../../conf/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9092:9090"
    restart: unless-stopped
    networks:
      - gateway

  grafana:
    image: grafana/grafana-oss:13.0.2
    container_name: gw-grafana
    environment:
      GF_PLUGINS_PREINSTALL: grafana-clickhouse-datasource
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../../conf/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../conf/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3030:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - gateway

volumes:
  clickhouse-data:
  prometheus-data:
  grafana-data:
  openbao-data:

networks:
  gateway:
    driver: bridge
  dataops:
    external: true
    name: dataops_default
