# WORKSPACE-GATEWAY Test Coverage Thresholds
#
# This project uses Lua unit tests (resty CLI), shell-based config
# validation, and Podman integration tests. Coverage measurement is
# not available for Lua or shell tests. Thresholds set to 1 as a
# floor to satisfy CI hook C1. Previous Python pytest thresholds
# (90/5) no longer apply after framework migration to Lua + shell.

unit:
  path: tests/lua
  min_coverage: 1
  source_path: plugins/custom
  runner: "tests/lua/run.sh"
  coverage: "false"

config:
  path: tests/config
  min_coverage: 1
  source_path: conf
  runner: "tests/config/run.sh"
  coverage: "false"

integration:
  path: tests/integration
  min_coverage: 5
  source_path: .
  runner: "tests/integration/run.sh"
  coverage: "false"
